<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.bit Domains</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', monospace;
        }
        #container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }
        #overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 200, 255, 0.4);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.5s;
        }
        #overlay.hidden {
            opacity: 0;
        }
        #version-switch {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 220;
            border: 1px solid rgba(100, 200, 255, 0.45);
            background: rgba(5, 8, 14, 0.78);
            color: rgba(180, 225, 255, 0.94);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            padding: 10px 14px;
            cursor: pointer;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
        }
        #version-switch.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        #version-switch:hover {
            border-color: rgba(120, 215, 255, 0.85);
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="overlay">.bit Domains | Generative Blockchain Art</div>
    <button id="version-switch" type="button" aria-label="Regresar a version 2">Version 2</button>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // OrbitControls
        class OrbitControls {
            constructor(camera, domElement) {
                this.camera = camera;
                this.domElement = domElement;
                this.target = new THREE.Vector3();
                this.minDistance = 3;
                this.maxDistance = 100;
                this.enableZoom = true;
                this.zoomSpeed = 1.2;
                this.enableRotate = true;
                this.rotateSpeed = 0.8;
                
                this.isDragging = false;
                this.rotateStart = new THREE.Vector2();
                this.rotateEnd = new THREE.Vector2();
                this.rotateDelta = new THREE.Vector2();
                
                this.domElement.addEventListener('mousedown', this.onMouseDown.bind(this));
                this.domElement.addEventListener('mousemove', this.onMouseMove.bind(this));
                this.domElement.addEventListener('mouseup', this.onMouseUp.bind(this));
                this.domElement.addEventListener('wheel', this.onMouseWheel.bind(this), { passive: false });
            }
            
            onMouseDown(e) {
                this.isDragging = true;
                this.rotateStart.set(e.clientX, e.clientY);
            }
            
            onMouseMove(e) {
                if (!this.isDragging) return;
                this.rotateEnd.set(e.clientX, e.clientY);
                this.rotateDelta.subVectors(this.rotateEnd, this.rotateStart);
                
                const width = this.domElement.clientWidth;
                const height = this.domElement.clientHeight;
                
                const rotateLeft = 2 * Math.PI * this.rotateDelta.x / width * this.rotateSpeed;
                const rotateUp = 2 * Math.PI * this.rotateDelta.y / height * this.rotateSpeed;
                
                this.rotate(rotateLeft, rotateUp);
                this.rotateStart.copy(this.rotateEnd);
            }
            
            onMouseUp() {
                this.isDragging = false;
            }
            
            onMouseWheel(e) {
                e.preventDefault();
                const scale = e.deltaY > 0 ? 1.1 : 0.9;
                const distance = this.camera.position.distanceTo(this.target);
                const newDistance = distance * scale;
                if (newDistance >= this.minDistance && newDistance <= this.maxDistance) {
                    this.camera.position.lerp(this.target, 1 - scale);
                }
            }
            
            rotate(angleX, angleY) {
                const quaternionX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), angleX);
                const quaternionY = new THREE.Quaternion();
                
                const right = new THREE.Vector3();
                right.crossVectors(this.camera.up, this.camera.position.clone().sub(this.target)).normalize();
                quaternionY.setFromAxisAngle(right, angleY);
                
                this.camera.position.sub(this.target);
                this.camera.position.applyQuaternion(quaternionX);
                this.camera.position.applyQuaternion(quaternionY);
                this.camera.position.add(this.target);
            }
            
            update() {
                this.camera.lookAt(this.target);
            }
        }

        // Configuración
        const CONFIG = {
            domainCount: 64,
            blockSize: 12,
            colors: {
                primary: 0x00ff88,      // Verde neon
                secondary: 0x00d4ff,    // Cyan digital
                accent: 0xff0066,       // Rosa magenta
                dark: 0x050505,
                grid: 0x1a1a2e
            }
        };

        // Escena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(CONFIG.colors.dark);
        scene.fog = new THREE.FogExp2(CONFIG.colors.dark, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 20, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('container').appendChild(renderer.domElement);

        const versionSwitchButton = document.getElementById('version-switch');
        const CORNER_PROXIMITY = 170;
        let hideButtonTimeout;

        function showVersionSwitchButton() {
            clearTimeout(hideButtonTimeout);
            versionSwitchButton.classList.add('visible');
        }

        function hideVersionSwitchButton(delay = 0) {
            clearTimeout(hideButtonTimeout);
            hideButtonTimeout = setTimeout(() => {
                versionSwitchButton.classList.remove('visible');
            }, delay);
        }

        function updateVersionSwitchVisibility(clientX, clientY) {
            const nearBottom = window.innerHeight - clientY <= CORNER_PROXIMITY;
            const nearRight = window.innerWidth - clientX <= CORNER_PROXIMITY;

            if (nearBottom && nearRight) {
                showVersionSwitchButton();
                return;
            }

            hideVersionSwitchButton(120);
        }

        window.addEventListener('mousemove', (e) => {
            updateVersionSwitchVisibility(e.clientX, e.clientY);
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                updateVersionSwitchVisibility(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                updateVersionSwitchVisibility(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('touchend', () => {
            hideVersionSwitchButton(900);
        });

        versionSwitchButton.addEventListener('click', () => {
            window.location.href = './index.html';
        });

        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);

        // Grid de blockchain
        const gridGroup = new THREE.Group();
        const gridSize = 32;
        const gridStep = 2;
        
        const gridLineMaterial = new THREE.LineBasicMaterial({ 
            color: CONFIG.colors.grid, 
            transparent: true, 
            opacity: 0.3 
        });

        // Lineas horizontales
        for (let i = -gridSize; i <= gridSize; i += gridStep) {
            const points = [];
            points.push(new THREE.Vector3(-gridSize, 0, i));
            points.push(new THREE.Vector3(gridSize, 0, i));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, gridLineMaterial);
            gridGroup.add(line);
        }

        // Lineas verticales
        for (let i = -gridSize; i <= gridSize; i += gridStep) {
            const points = [];
            points.push(new THREE.Vector3(i, 0, -gridSize));
            points.push(new THREE.Vector3(i, 0, gridSize));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, gridLineMaterial);
            gridGroup.add(line);
        }
        
        gridGroup.rotation.x = -Math.PI / 2;
        scene.add(gridGroup);

        // Generador de nombres de dominio
        const prefixes = ['crypto', 'web3', 'meta', 'nft', 'block', 'chain', 'decent', 'token', 'hash', 'node'];
        const suffixes = ['.bit', '.eth', '.crypto', '.nft', '.web3', '.dao', '.meta', '.chain'];
        
        function generateDomain() {
            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            const suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
            return prefix + suffix;
        }

        // Bloques de dominio
        const blocks = [];
        const blockGeometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);

        class DomainBlock {
            constructor(x, z, id) {
                this.x = x;
                this.z = z;
                this.id = id;
                this.domain = generateDomain();
                this.hash = this.generateHash();
                this.age = 0;
                this.maxAge = 200 + Math.random() * 300;
                
                // Color basado en el tipo de dominio
                const colorType = Math.random();
                if (colorType < 0.33) {
                    this.color = new THREE.Color(CONFIG.colors.primary);
                } else if (colorType < 0.66) {
                    this.color = new THREE.Color(CONFIG.colors.secondary);
                } else {
                    this.color = new THREE.Color(CONFIG.colors.accent);
                }
                
                this.material = new THREE.MeshBasicMaterial({
                    color: this.color,
                    transparent: true,
                    opacity: 0.9,
                    wireframe: Math.random() > 0.7
                });
                
                this.mesh = new THREE.Mesh(blockGeometry, this.material);
                this.mesh.position.set(x, 0, z);
                this.mesh.scale.set(0, 0, 0);
                
                scene.add(this.mesh);
                
                // Conexiones visuales
                this.connections = [];
            }
            
            generateHash() {
                let hash = '0x';
                const chars = '0123456789abcdef';
                for (let i = 0; i < 64; i++) {
                    hash += chars[Math.floor(Math.random() * chars.length)];
                }
                return hash;
            }
            
            update(time) {
                this.age++;
                
                // Efecto de aparición
                if (this.age < 50) {
                    const scale = this.age / 50;
                    this.mesh.scale.set(scale, scale, scale);
                    this.mesh.position.y = (1 - scale) * 5;
                } else if (this.age > this.maxAge - 50) {
                    // Efecto de desaparición
                    const fadeProgress = (this.age - (this.maxAge - 50)) / 50;
                    const scale = 1 - fadeProgress;
                    this.mesh.scale.set(scale, scale, scale);
                    this.material.opacity = 0.9 * (1 - fadeProgress);
                } else {
                    this.mesh.scale.set(1, 1, 1);
                    this.mesh.position.y = Math.sin(time * 2 + this.id) * 0.3;
                    
                    // Pulso de red blockchain
                    const pulse = Math.sin(time * 3 + this.id * 0.5) * 0.2 + 0.8;
                    this.material.opacity = 0.7 + pulse * 0.3;
                }
                
                // Rotación lenta
                this.mesh.rotation.x += 0.005;
                this.mesh.rotation.y += 0.008;
                
                return this.age < this.maxAge;
            }
            
            destroy() {
                scene.remove(this.mesh);
            }
        }

        // Partículas de datos
        const particleCount = 2000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleVelocities = [];
        
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i * 3] = (Math.random() - 0.5) * 60;
            particlePositions[i * 3 + 1] = Math.random() * 20;
            particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
            
            particleVelocities.push({
                x: (Math.random() - 0.5) * 0.02,
                y: (Math.random() - 0.5) * 0.02,
                z: (Math.random() - 0.5) * 0.02
            });
        }
        
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.1,
            color: CONFIG.colors.secondary,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // Animación
        let time = 0;
        let spawnTimer = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            spawnTimer++;
            
            // Spawn nuevos bloques
            if (spawnTimer > 5 && blocks.length < CONFIG.domainCount) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 5 + Math.random() * 20;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                blocks.push(new DomainBlock(x, z, blocks.length));
                spawnTimer = 0;
            }
            
            // Update bloques
            for (let i = blocks.length - 1; i >= 0; i--) {
                if (!blocks[i].update(time)) {
                    blocks[i].destroy();
                    blocks.splice(i, 1);
                }
            }
            
            // Update partículas
            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] += particleVelocities[i].x;
                positions[i * 3 + 1] += particleVelocities[i].y;
                positions[i * 3 + 2] += particleVelocities[i].z;
                
                // Reset si salen del área
                if (Math.abs(positions[i * 3]) > 30 || 
                    Math.abs(positions[i * 3 + 1]) > 20 || 
                    Math.abs(positions[i * 3 + 2]) > 30) {
                    positions[i * 3] = (Math.random() - 0.5) * 40;
                    positions[i * 3 + 1] = Math.random() * 15;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 40;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;
            
            // Animar grid
            gridGroup.rotation.z = Math.sin(time * 0.1) * 0.1;
            
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        
        // Ocultar overlay después de 3 segundos
        setTimeout(() => {
            document.getElementById('overlay').classList.add('hidden');
        }, 3000);
    </script>
</body>
</html>
